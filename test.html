<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobHunter Extension UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for extension constraints */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
    </style>
  </head>
  <body class="bg-[#0b0c0f] flex items-center justify-center min-h-screen">
    <!-- Chrome Extension Container (Fixed width typical for extensions) -->
    <div
      class="w-[380px] h-[580px] bg-[#0b0c0f] text-gray-200 font-sans border border-[#1f2128] shadow-2xl flex flex-col relative overflow-hidden"
    >
      <!-- Header -->
      <header
        class="flex items-center justify-between px-4 py-3 border-b border-[#1f2128] bg-[#0b0c0f]/90 backdrop-blur z-10"
      >
        <div class="flex items-center gap-2">
          <div class="w-1.5 h-4 bg-[#F5A623] rounded-sm"></div>
          <h1 class="text-sm font-bold tracking-wide text-white uppercase">
            JobHunter
          </h1>
        </div>
        <div class="flex items-center gap-2">
          <button
            class="px-2.5 py-1 text-xs font-medium text-gray-300 bg-[#16181d] border border-[#262930] rounded hover:bg-[#1f2128] transition-colors"
          >
            Backup
          </button>
          <button class="p-1 text-gray-400 hover:text-white transition-colors">
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Scrollable List -->
      <main class="flex-1 overflow-y-auto p-3 space-y-3">
        <!-- ITEM: Text Field (Preview Mode) -->
        <div
          class="group bg-[#13151a] border border-[#262930] rounded-md p-3 hover:border-[#3a3f4a] transition-colors relative"
        >
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-xs font-semibold text-gray-400">Full Name</label>
            <div
              class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-1"
            >
              <button class="text-gray-500 hover:text-white p-1">
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                  ></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <div
              class="flex-1 bg-[#0b0c0f] border border-[#1f2128] rounded px-2.5 py-1.5 text-sm text-gray-200 truncate cursor-pointer hover:border-[#3a3f4a]"
              title="Click to copy"
            >
              Jung Rama
            </div>
            <button
              class="bg-[#1f2128] border border-[#262930] rounded p-1.5 hover:text-white hover:bg-[#2a2d35] transition-colors"
              title="Copy"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- ITEM: File Field (Preview Mode - Draggable) -->
        <div
          class="group bg-[#13151a] border border-[#262930] rounded-md p-3 hover:border-[#3a3f4a] transition-colors relative"
        >
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-xs font-semibold text-gray-400">Resume</label>
            <div
              class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-1"
            >
              <button class="text-gray-500 hover:text-white p-1">
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Draggable File Target -->
          <div
            draggable="true"
            class="flex items-center gap-3 bg-[#0b0c0f] border border-[#1f2128] border-dashed rounded px-2.5 py-2 cursor-grab active:cursor-grabbing hover:border-[#F5A623]/50 hover:bg-[#1a1711] transition-all"
          >
            <div class="text-gray-500 cursor-grab">
              <!-- Grip Icon -->
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M9 5a2 2 0 11-4 0 2 2 0 014 0zM9 12a2 2 0 11-4 0 2 2 0 014 0zM9 19a2 2 0 11-4 0 2 2 0 014 0zM19 5a2 2 0 11-4 0 2 2 0 014 0zM19 12a2 2 0 11-4 0 2 2 0 014 0zM19 19a2 2 0 11-4 0 2 2 0 014 0z"
                ></path>
              </svg>
            </div>
            <div class="flex-1 flex flex-col overflow-hidden">
              <span class="text-sm text-gray-200 truncate"
                >Jung_Rama_Resume.pdf</span
              >
              <span class="text-[10px] text-gray-500 uppercase tracking-widest"
                >Drag to file input</span
              >
            </div>
            <div class="flex items-center gap-1">
              <button
                class="p-1.5 text-gray-400 hover:text-white bg-[#1f2128] rounded"
                title="Download"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                  ></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- ITEM: Text Field (Edit Mode) -->
        <div
          class="bg-[#16181d] border border-[#3a3f4a] rounded-md p-3 shadow-lg relative"
        >
          <div class="flex justify-between items-center mb-3">
            <input
              type="text"
              value="Email"
              class="bg-transparent text-sm font-bold text-white outline-none w-1/2 border-b border-transparent focus:border-[#F5A623] transition-colors pb-0.5"
            />
            <div class="flex items-center gap-2">
              <select
                class="bg-[#0b0c0f] border border-[#262930] text-xs text-gray-300 rounded px-2 py-1 outline-none focus:border-[#F5A623]"
              >
                <option value="text" selected>Text</option>
                <option value="file">File</option>
              </select>
              <button class="text-red-400 hover:text-red-300 p-1">
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="space-y-3">
            <div>
              <label
                class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1"
                >Form Aliases (Comma-separated)</label
              >
              <input
                type="text"
                value="email, e-mail, email address"
                class="w-full bg-[#0b0c0f] border border-[#262930] rounded px-2.5 py-1.5 text-sm text-gray-200 outline-none focus:border-[#F5A623] transition-colors"
              />
            </div>
            <div>
              <label
                class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1"
                >Value</label
              >
              <input
                type="text"
                value="work@jungrama.com"
                class="w-full bg-[#0b0c0f] border border-[#262930] rounded px-2.5 py-1.5 text-sm text-gray-200 outline-none focus:border-[#F5A623] transition-colors"
              />
            </div>
            <div class="flex justify-end gap-2 pt-2">
              <button
                class="px-3 py-1.5 text-xs font-medium text-gray-400 hover:text-white transition-colors"
              >
                Cancel
              </button>
              <button
                class="px-3 py-1.5 text-xs font-medium text-[#0b0c0f] bg-[#F5A623] rounded hover:bg-[#e0951b] transition-colors"
              >
                Save
              </button>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer Action -->
      <div class="p-3 border-t border-[#1f2128] bg-[#0b0c0f]">
        <button
          class="w-full py-2 flex items-center justify-center gap-2 bg-transparent border border-[#F5A623] text-[#F5A623] rounded-md text-sm font-medium hover:bg-[#F5A623]/10 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            ></path>
          </svg>
          Add Field
        </button>
      </div>
    </div>
  </body>
</html>
